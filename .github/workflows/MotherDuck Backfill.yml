name: Backfill MotherDuck

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "First game date to load, YYYY-MM-DD"
        required: true
        default: "2026-03-27"
        type: string
      end_date:
        description: "Last game date to load, YYYY-MM-DD"
        required: true
        type: string
      motherduck_db:
        description: "MotherDuck database name. Defaults to repo variable MOTHERDUCK_DB or milb_stats."
        required: false
        type: string

jobs:
  backfill:
    name: Backfill MiLB monthly chunks
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
      DEFAULT_MOTHERDUCK_DB: ${{ vars.MOTHERDUCK_DB || 'milb_stats' }}
      INPUT_START_DATE: ${{ github.event.inputs.start_date }}
      INPUT_END_DATE: ${{ github.event.inputs.end_date }}
      INPUT_MOTHERDUCK_DB: ${{ github.event.inputs.motherduck_db || '' }}
      BACKFILL_DELAY: "0.3"
      BACKFILL_RETRIES: "5"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate settings
        id: settings
        shell: bash
        run: |
          if [ -z "$motherduck_token" ]; then
            echo "MOTHERDUCK_TOKEN repository secret is required." >&2
            exit 1
          fi

          motherduck_db="${INPUT_MOTHERDUCK_DB:-$DEFAULT_MOTHERDUCK_DB}"

          echo "motherduck_db=$motherduck_db" >> "$GITHUB_OUTPUT"
          echo "Backfilling $INPUT_START_DATE through $INPUT_END_DATE into $motherduck_db"

      - name: Build monthly chunks
        id: chunks
        shell: python
        run: |
          from datetime import date, timedelta
          import os

          start_date = date.fromisoformat(os.environ["INPUT_START_DATE"])
          end_date = date.fromisoformat(os.environ["INPUT_END_DATE"])
          if start_date > end_date:
              raise SystemExit("start_date must be on or before end_date")

          chunk_path = os.environ["GITHUB_WORKSPACE"] + "/backfill_chunks.txt"
          chunk_count = 0
          current = start_date

          with open(chunk_path, "w", encoding="utf-8") as chunks:
              while current <= end_date:
                  if current.month == 12:
                      next_month = date(current.year + 1, 1, 1)
                  else:
                      next_month = date(current.year, current.month + 1, 1)

                  chunk_end = min(end_date, next_month - timedelta(days=1))
                  chunks.write(f"{current.isoformat()} {chunk_end.isoformat()}\n")
                  chunk_count += 1
                  current = chunk_end + timedelta(days=1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"chunk_count={chunk_count}\n")

          print(f"Wrote {chunk_count} monthly chunk(s) to {chunk_path}")

      - name: Backfill MotherDuck in monthly chunks
        shell: bash
        run: |
          set -euo pipefail

          chunk_number=0
          while read -r chunk_start chunk_end; do
            chunk_number=$((chunk_number + 1))
            echo "::group::Chunk ${chunk_number}/${{ steps.chunks.outputs.chunk_count }}: ${chunk_start} to ${chunk_end}"

            python -m milb_warehouse.cli \
              --start-date "$chunk_start" \
              --end-date "$chunk_end" \
              --motherduck-db "${{ steps.settings.outputs.motherduck_db }}" \
              --delay "$BACKFILL_DELAY" \
              --retries "$BACKFILL_RETRIES"

            echo "::endgroup::"
          done < backfill_chunks.txt

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milb-backfill-${{ github.event.inputs.start_date }}-to-${{ github.event.inputs.end_date }}
          path: |
            data/parquet/
            data/raw_debug/errors_*.csv
          if-no-files-found: ignore
          retention-days: 14
