name: Daily MotherDuck Load

on:
  schedule:
    # Runs daily at 5:00 AM America/Chicago during daylight saving time.
    # The job computes "yesterday" in America/Chicago before loading.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Game date to load, YYYY-MM-DD. Defaults to yesterday in America/Chicago."
        required: false
        type: string
      motherduck_db:
        description: "MotherDuck database name. Defaults to repository variable MOTHERDUCK_DB or milb_stats."
        required: false
        type: string
      refresh_players_only:
        description: "Populate players from existing MotherDuck fact rows without reloading games."
        required: false
        type: boolean
        default: false

jobs:
  load:
    name: Load daily MiLB increment
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
      DEFAULT_MOTHERDUCK_DB: ${{ vars.MOTHERDUCK_DB || 'milb_stats' }}
      INPUT_GAME_DATE: ${{ github.event.inputs.game_date || '' }}
      INPUT_MOTHERDUCK_DB: ${{ github.event.inputs.motherduck_db || '' }}
      INPUT_REFRESH_PLAYERS_ONLY: ${{ github.event.inputs.refresh_players_only || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve load settings
        id: settings
        shell: bash
        run: |
          if [ -z "$motherduck_token" ]; then
            echo "MOTHERDUCK_TOKEN repository secret is required." >&2
            exit 1
          fi

          game_date="${INPUT_GAME_DATE:-$(TZ=America/Chicago date -d 'yesterday' +%F)}"
          motherduck_db="${INPUT_MOTHERDUCK_DB:-$DEFAULT_MOTHERDUCK_DB}"
          refresh_players_only="${INPUT_REFRESH_PLAYERS_ONLY:-false}"

          echo "game_date=$game_date" >> "$GITHUB_OUTPUT"
          echo "motherduck_db=$motherduck_db" >> "$GITHUB_OUTPUT"
          echo "refresh_players_only=$refresh_players_only" >> "$GITHUB_OUTPUT"

          if [ "$refresh_players_only" = "true" ]; then
            echo "Refreshing players into MotherDuck database $motherduck_db"
          else
            echo "Loading game_date=$game_date into MotherDuck database $motherduck_db"
          fi

      - name: Extract and load MotherDuck
        if: steps.settings.outputs.refresh_players_only != 'true'
        run: >
          python -m milb_warehouse.cli
          --date "${{ steps.settings.outputs.game_date }}"
          --motherduck-db "${{ steps.settings.outputs.motherduck_db }}"

      - name: Refresh players only
        if: steps.settings.outputs.refresh_players_only == 'true'
        run: >
          python -m milb_warehouse.cli
          --refresh-players-only
          --motherduck-db "${{ steps.settings.outputs.motherduck_db }}"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milb-load-${{ steps.settings.outputs.game_date }}
          path: |
            data/parquet/
            data/raw_debug/errors_*.csv
          if-no-files-found: ignore
          retention-days: 14
